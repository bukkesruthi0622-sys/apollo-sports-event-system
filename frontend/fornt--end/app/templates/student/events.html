{% extends 'base.html' %}
{% block content %}
<div class="container py-5 mt-5">
    <h2 class="display-4 fw-bold text-center mb-5" style="color:var(--dark-blue);">Available Sports Events</h2>
    <div class="row g-4">
        {% for game in games %}
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0 rounded-4 h-100">
                <div class="card-body p-4 text-center">
                    <i class="ph ph-medal display-3 mb-3" style="color:var(--primary-green);"></i>
                    <h4 class="fw-bold mb-3">{{ game.name }}</h4>
                    <p class="text-muted small mb-4">{{ game.rules[:60] }}...</p>
                    <a href="{{ url_for('student.game_details', game_id=game.id) }}" class="btn btn-outline-primary rounded-pill px-4 fw-semibold">View Details</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
