{% extends 'base.html' %}
{% block content %}
<div class="container text-center py-5 mt-5">
    <h1 class="display-1 fw-bold mb-3" style="color:var(--primary-blue);">404</h1>
    <h2 class="mb-4">Page Not Found</h2>
    <p class="text-muted mb-4">Sorry, the page you are looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-5 py-3 fw-bold shadow-sm" style="background:var(--primary-blue); border:none;">Return to Homepage</a>
</div>
{% endblock %}
